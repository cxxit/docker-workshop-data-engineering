# Docker Compose configuration for PostgreSQL + pgAdmin stack
# This sets up a local data engineering environment similar to production.


# docker run -it --rm \
#   -e POSTGRES_USER="root" \
#   -e POSTGRES_PASSWORD="root" \
#   -e POSTGRES_DB="ny_taxi" \
#   -v ny_taxi_postgres_data:/var/lib/postgresql \
#   -p 5432:5432 \
#   --network=pg-network \
#   --name pgdatabase \
#   postgres:18

# docker run -it \
#   -e PGADMIN_DEFAULT_EMAIL="admin@admin.com" \
#   -e PGADMIN_DEFAULT_PASSWORD="root" \
#   -v pgadmin_data:/var/lib/pgadmin \
#   -p 8085:80 \
#   --network=pg-network \
#   --name pgadmin \
#   dpage/pgadmin4

services:
  # PostgreSQL database service
  # Stores the NYC taxi dataset and exposes port 5432
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "ny_taxi"
    volumes:
      # Persistent storage so data is not lost when container stops
      - "ny_taxi_postgres_data:/var/lib/postgresql"
    ports:
      - "5432:5432"

  # pgAdmin web UI for managing PostgreSQL visually
  # Accessible at http://localhost:8085
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
    volumes:
      # Stores pgAdmin settings and server connections
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"

# Named volumes for persistent storage
# Prevents data loss when containers are removed
volumes:
  ny_taxi_postgres_data:
  pgadmin_data:
